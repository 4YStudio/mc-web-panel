<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <title>MC Server Panel Ultra</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <div id="app" class="d-flex h-100" v-cloak>

        <div class="toast-container">
            <transition-group name="toast">
                <div v-for="t in toasts" :key="t.id" class="toast show align-items-center mb-2" :data-type="t.type">
                    <div class="d-flex w-100">
                        <div class="toast-body">{{ t.message }}</div>
                        <button class="btn-close ms-auto me-2 m-auto" @click="removeToast(t.id)"></button>
                    </div>
                </div>
            </transition-group>
        </div>

        <progress-modal></progress-modal>

        <div class="modal fade" id="confirmModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">{{ modalData.title }}</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div v-html="modalData.message" class="mb-3"></div>
                        <div v-if="modalData.mode === 'input'" :class="{'input-group': modalData.suffix}">
                            <input v-model="modalData.inputValue" class="form-control"
                                :placeholder="modalData.placeholder" @keyup.enter="confirmModalAction">
                            <span v-if="modalData.suffix" class="input-group-text bg-body-secondary text-muted">{{ modalData.suffix }}</span>
                        </div>
                        <select v-if="modalData.mode === 'select'" v-model="modalData.inputValue" class="form-select">
                            <option v-for="opt in modalData.options" :value="opt.value">{{ opt.label }}</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">{{ $t('common.cancel') }}</button>
                        <button class="btn btn-primary" @click="confirmModalAction">{{ $t('common.execute') }}</button>
                    </div>
                </div>
            </div>
        </div>

        <Transition name="page-fade" mode="out-in">
            <login v-if="!store.auth.loggedIn" key="login"></login>

            <instance-manager v-else-if="store.view === 'instance-manager'" class="w-100" key="hub"></instance-manager>

            <div v-else-if="store.view === 'java'" class="w-100 vh-100 p-4 p-md-5 overflow-auto" key="java">
                <div class="container-xxl p-0">
                    <java-manager></java-manager>
                </div>
            </div>

            <div v-else-if="store.view === 'panel-settings'"
                class="w-100 vh-100 p-4 p-md-5 overflow-auto" key="settings">
                <div class="container-xxl p-0">
                    <panel-settings></panel-settings>
                </div>
            </div>

            <div v-else-if="store.view === 'about'" class="w-100 vh-100 p-4 p-md-5 overflow-auto"
                key="about">
                <div class="container-xxl p-0">
                    <about></about>
                </div>
            </div>

            <div v-else-if="store.view === 'plugins'" class="w-100 vh-100 p-4 p-md-5 overflow-auto"
                key="plugins">
                <div class="container-xxl p-0">
                    <plugin-manager></plugin-manager>
                </div>
            </div>

            <div v-else-if="isPluginView && !store.currentInstanceId" class="w-100 vh-100 p-4 p-md-5 overflow-auto"
                :key="'plugin-' + store.view">
                <div class="container-xxl p-0">
                    <component :is="pluginViewComponent"></component>
                </div>
            </div>

            <div v-else class="d-flex h-100 w-100" key="main">
                <div class="mobile-overlay" :class="{show: sidebarOpen}" @click="sidebarOpen = false"></div>

                <sidebar class="sidebar" :class="{show: sidebarOpen}" @close-sidebar="sidebarOpen = false"></sidebar>

                <div class="d-flex flex-column w-100 overflow-hidden">
                    <div class="mobile-header">
                        <button class="btn btn-link text-body p-0 me-3" @click="sidebarOpen = true">
                            <i class="fa-solid fa-bars fa-lg"></i>
                        </button>
                        <h5 class="m-0 fw-bold">MC Panel</h5>
                    </div>

                    <div class="content">
                        <Transition name="fade" mode="out-in">
                            <dashboard v-if="store.view === 'dashboard'" key="dashboard"></dashboard>
                            <server-properties-manager v-else-if="store.view === 'properties'"
                                key="properties"></server-properties-manager>
                            <mods-manager v-else-if="store.view === 'mods'" key="mods"></mods-manager>
                            <modrinth-browser v-else-if="store.view === 'modrinth'" key="modrinth"></modrinth-browser>
                            <file-manager v-else-if="store.view === 'files'" key="files"></file-manager>

                            <player-manager v-else-if="store.view === 'players'" key="players"></player-manager>
                            <about v-else-if="store.view === 'about'" key="about"></about>
                            <div v-else-if="isPluginView" :key="'plugin-' + store.view" class="animate-in">
                                <component :is="pluginViewComponent"></component>
                            </div>
                        </Transition>
                    </div>
                </div>
            </div>
        </Transition>

    </div>

    <script src="/js/axios.min.js"></script>
    <script src="/js/bootstrap.bundle.min.js"></script>
    <script src="/js/socket.io.js"></script>
    <script src="/js/marked.min.js"></script>
    <script type="module" src="js/app.js?v=1.5.0"></script>
</body>

</html>
